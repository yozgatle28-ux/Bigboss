name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project (eğer zip olarak yüklendiyse)
        run: |
          if [ -f bigboss-skeleton.zip ]; then
            unzip -o bigboss-skeleton.zip
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -P /tmp
          sudo unzip -q -d /opt/gradle /tmp/gradle-8.7-bin.zip
          echo "/opt/gradle/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        working-directory: bigboss
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bigboss-debug-apk
          path: bigboss/app/build/outputs/apk/debug/app-debug.apk
